<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OG Card Rafael Furlanetti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1200px; height:630px; overflow:hidden; }
  body {
    font-family:'Inter',-apple-system,sans-serif;
    background:#0A0A0A;
    color:#fff;
    position:relative;
    width:1200px;
    height:630px;
  }
  .glow1 { position:absolute; top:-200px; left:-150px; width:700px; height:700px; background:radial-gradient(circle, rgba(255,214,10,0.18) 0%, transparent 60%); pointer-events:none; }
  .glow2 { position:absolute; bottom:-180px; right:-180px; width:700px; height:700px; background:radial-gradient(circle, rgba(255,214,10,0.10) 0%, transparent 65%); pointer-events:none; }
  .pattern {
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,214,10,0.10) 1.5px, transparent 1.5px);
    background-size:36px 36px;
    -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, #000 30%, transparent 90%);
    mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, #000 30%, transparent 90%);
    pointer-events:none;
  }
  .wrap {
    position:relative;
    z-index:2;
    padding:80px 90px;
    height:100%;
    display:flex;
    align-items:center;
    gap:64px;
  }
  .avatar {
    width:200px;
    height:200px;
    border-radius:50%;
    background:linear-gradient(135deg, #FFD60A 0%, #FFB800 100%);
    color:#0A0A0A;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:78px;
    font-weight:800;
    letter-spacing:-3px;
    box-shadow:0 24px 80px rgba(255,214,10,0.35);
    flex-shrink:0;
  }
  .text { flex:1; min-width:0; }
  .label {
    font-size:18px;
    color:#FFD60A;
    text-transform:uppercase;
    letter-spacing:3px;
    font-weight:600;
    margin-bottom:18px;
  }
  .name {
    font-size:78px;
    font-weight:800;
    letter-spacing:-2px;
    line-height:1.0;
    margin-bottom:22px;
    color:#fff;
  }
  .roles {
    font-size:24px;
    font-weight:500;
    color:#bdbdbd;
    line-height:1.45;
    margin-bottom:30px;
    max-width:560px;
  }
  .roles b { color:#fff; font-weight:600; }
  .cta {
    display:inline-block;
    background:#FFD60A;
    color:#0A0A0A;
    font-size:18px;
    font-weight:700;
    padding:16px 28px;
    border-radius:999px;
    letter-spacing:0.3px;
  }
  .footer {
    position:absolute;
    bottom:36px;
    right:90px;
    font-size:14px;
    color:#777;
    letter-spacing:2px;
    text-transform:uppercase;
    z-index:2;
  }
  .accent {
    position:absolute;
    top:0; left:0;
    width:6px;
    height:100%;
    background:#FFD60A;
    z-index:3;
  }
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="pattern"></div>
  <div class="accent"></div>
  <div class="wrap">
    <div class="avatar">RF</div>
    <div class="text">
      <div class="label">Contato direto</div>
      <div class="name">Rafael Furlanetti</div>
      <div class="roles">
        <b>Sócio-diretor XP Investimentos</b><br>
        Presidente ANCORD &nbsp;·&nbsp; Hot Market · CNN Brasil
      </div>
      <div class="cta">newscale.tech/rafael-furlanetti</div>
    </div>
  </div>
  <div class="footer">Para contato ou parceria</div>
</body>
</html>
