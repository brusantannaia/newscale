[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Headers de segurança para propostas (proteção extra)
[[headers]]
  for = "/propostas/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Redirecionamento /admin para /admin/ com barra no final
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
