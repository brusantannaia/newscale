[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Headers de segurança para propostas (proteção extra)
[[headers]]
  for = "/propostas/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Redirecionamento /admin para /admin/ com barra no final
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Redirecionamentos de propostas movidas para /propostas/
[[redirects]]
  from = "/proposta-Alvaro-11082025.html"
  to = "/propostas/proposta-Alvaro-11082025.html"
  status = 301

[[redirects]]
  from = "/proposta-atmosfera/*"
  to = "/propostas/proposta-atmosfera/:splat"
  status = 301

