<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>A IA me Multiplica — acesso restrito</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--blue:#015FA1;--night:#0E2841;--green:#46B149;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',Arial,sans-serif;background:linear-gradient(135deg,#0E2841 0%,#015FA1 60%,#0E2841 100%);
       color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .card{width:100%;max-width:430px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.16);
        border-radius:20px;padding:42px 38px;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);text-align:center;
        backdrop-filter:blur(6px)}
  .kick{font-weight:800;font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--green);margin-bottom:14px}
  h1{font-family:'Anton',Impact,sans-serif;font-weight:400;font-size:38px;line-height:1;text-transform:uppercase;letter-spacing:.01em}
  h1 .g{color:var(--green)}
  p.sub{font-size:14.5px;color:rgba(255,255,255,.72);margin:14px 0 26px;line-height:1.5}
  input{width:100%;padding:15px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.22);
        background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:inherit;outline:none;text-align:center;letter-spacing:.04em}
  input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(70,177,73,.25)}
  input::placeholder{color:rgba(255,255,255,.4)}
  button{width:100%;margin-top:14px;padding:15px;border:none;border-radius:12px;background:var(--green);color:#fff;
         font-size:16px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:.15s}
  button:hover{background:#3aa23d}button:active{transform:translateY(1px)}
  .err{color:#ffb4a8;font-size:13.5px;font-weight:600;margin-top:14px;min-height:18px}
  .ft{margin-top:26px;font-size:12px;color:rgba(255,255,255,.45)}
  .ld{display:none}
</style>
</head>
<body>

  <p class="sub">Conteúdo restrito. Digite a senha de acesso para abrir a apresentação.</p>
  <input id="pw" type="password" placeholder="senha de acesso" autofocus />
  <button type="submit" id="b">Entrar</button>
  <div class="err" id="e"></div>
  <div class="ft">Apresentação confidencial · NewScale Consulting AI</div>
</form>

const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64d(SALT),iterations:ITER,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(IV)},key,b64d(CT));
  return new TextDecoder('utf-8').decode(pt);
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const e1=document.getElementById('e'), b=document.getElementById('b');
  e1.textContent=''; b.textContent='Abrindo…'; b.disabled=true;
  try{
    const html=await unlock(document.getElementById('pw').value);
    document.open(); document.write(html); document.close();
  }catch(err){
    e1.textContent='Senha incorreta. Tente de novo.';
    b.textContent='Entrar'; b.disabled=false;
    document.getElementById('pw').select();
  }
});
