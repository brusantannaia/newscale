backend:
  name: git-gateway
  branch: main

# Onde as imagens são salvas no repositório
media_folder: "images/uploads"
# Caminho público das imagens no site gerado
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data de publicação", name: "date", widget: "datetime", default: "" }
      - { label: "Descrição (resumo)", name: "description", widget: "text" }
      - { label: "Imagem de capa", name: "cover", widget: "image", required: false, allow_multiple: false }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
